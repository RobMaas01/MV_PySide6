# MV3 pad-configuratie (launcher)
# Paden mogen absoluut zijn of relatief t.o.v. de launcher-exe (MV3.exe).
#
# app_dir    = map waar MV3_app.exe en _internal staan
# datasource = map met mv_data.db en Excel-bestanden
# settings   = map met JSON-variabelen
#
# Voorbeelden absoluut:
#   app_dir    = \\server\share\MV3\app
#   datasource = \\server\share\MV3\data
#   settings   = C:\Users\Gebruiker\AppData\Local\MV3\settings
#
# Standaard (lege waarden = naast de launcher-exe):

[paths]
app_dir    = .
datasource = datasource
settings   = settings
